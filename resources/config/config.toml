# abstract: this file does the following:
# - creates a slow "fade in" lighting up animation before transitioning (ideally) seamlessly into a solid color

# required, must reference a display added below
startup-display = "Pulse1"
# optional, defaults to false
verbose = true
# optional, defaults to false
# no-wait-for-read = true
# optional, must be enabled explicitly; defaults to false
# capture-audio = true
# optional, defaults to 50.0 (higher = more sensitive to quiet sounds)
# input-gain = 50.0
# optional, defaults to true (set to false for instant per-frame audio values)
# audio-smoothing = true
# optional, defaults to 0.15 (0–1, higher = faster response, lower = smoother)
# audio-smoothing-alpha = 0.15
# optional, defaults to [], this way you can restrict the program to only connect to a specific serial, in case you have multiple ones.
#                       You can check your serial either through the console output when running this tool or by looking at the bottom of your microphone stand.
#                       IF YOU HAVE MULTIPLE DEVICES FEEL FREE TO CONTACT ME! (I cannot test this myself) https://github.com/MuffinMario/quadcast2Srgb
# allowed-serials = ["12345678", "87654321"]

[[display]]
# required
type = "transition"
name = "Solid"
#end-condition = { type = "time", duration-ms = 5000 } # optional, if not given display will repeat endlessly
next-display = "Pulse1" # optional, defaults to empty, meaning this display will be the end of the sequence
# slight breathing color transition from indigo to blue
transition-colors = ["290066", "4d004d"]
transition-speed = 0.01 # optional, defaults to 0.005, bigger number => faster progression
# bezier = [0.11, 0.0, 0.35, 1.0] # default ease-in-out, see https://cubic-bezier.com
bezier = [0.91,0,0.83,0.67]

[[display]]
type = "pulse-color"
name = "Pulse1"
next-display = "Solid"
# optional, but you probably want to customize this.
# color = "#290066"
end-condition = { type = "time", duration-ms = 2050 } # optional, if not given display will repeat endlessly
# optional, for custom values check out a generator, e.g. https://cubic-bezier.com
cubic-bezier = [0.58, 0.14, 0.89,0.63] # defaults to custom ease in out
# pulse speed is basically the step progress from 0 to 1 in 50ms intervals, meaning we have 20 steps per second
pulse-speed = 0.025 # optional, defaults to 0.025, bigger number => faster progression.
